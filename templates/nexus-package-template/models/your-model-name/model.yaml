# Model Configuration Template
# Replace placeholders with your actual model information

model:
  id: "your-org/your-model-name"  # Replace with Hugging Face model repository identifier (e.g., "ibm-nasa-geospatial/Prithvi-EO-2.0-300M-TL")

  # (Optional) Model owner GitHub identifier
  # If omitted, ownership defaults to the Nexus package owner
  # owner: "your-github-username"

  # vLLM Configuration (optional - only include if model needs additional vLLM plugins)
  # Only required for models targeting the product or candidate distribution variants
  # vllm:
  #   enabled: true  # Must be true if vLLM section is present
  #   plugins:
  #     # General plugin (optional) - loads the model class required in runtime
  #     # general: "your-vllm-plugin"
  #
  #     # IO processors (optional) - list of vLLM IO processor plugins
  #     io_processors:
  #       - "your-io-processor-plugin"
