# ADO Discoveryspace Configuration for Benchmark Instance
# This file defines the full ADO discoveryspace for this specific benchmark instance

# Required: Entity space defining parameter values for the benchmark
entitySpace:
  - identifier: dataset
    propertyDomain:
      values: ["sen1floods11"]
  - identifier: split
    propertyDomain:
      values: ["test"]

# Required: List of experiments to run
experiments:
  - actuatorIdentifier: custom_experiments
    experimentIdentifier: local-segmentation-eval  # Must match an experiment registered in nexus.yaml

